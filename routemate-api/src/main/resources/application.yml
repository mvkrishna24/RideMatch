spring:
  application:
    name: routemate-api
  profiles:
    default: local
  autoconfigure:
    # Identity comes from Firebase tokens; the in-memory user (and its
    # generated password log line) is auto-config noise.
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5433/routemate
    username: routemate
    password: routemate

---
spring:
  config:
    activate:
      on-profile: production
  datasource:
    # Railway Postgres exposes PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD.
    # (Its DATABASE_URL is postgres://... — NOT a JDBC URL — so we build the
    # JDBC form here. DATABASE_JDBC_URL overrides everything if ever needed.)
    url: ${DATABASE_JDBC_URL:jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 10000

server:
  port: ${PORT:8080}
